services:
  - type: web
    name: guardian-ciudadano-peru-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: GUARDIAN_ADMIN_EMAIL
        value: "analista@guardian.pe"
      - key: GUARDIAN_ADMIN_PASSWORD
        value: "Guardian2026!"
      - key: GUARDIAN_TOKEN_KEY
        generateValue: true
      - key: GUARDIAN_TOKEN_TTL_SECONDS
        value: "3600"
      - key: GUARDIAN_DEV_EMAIL_CODES
        value: "false"
      - key: GUARDIAN_CORS_ORIGINS
        value: "https://guardian-ciudadano-peru-web.onrender.com,https://gianfrancorossell13-bot.github.io"

  - type: static
    name: guardian-ciudadano-peru-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        value: "https://guardian-ciudadano-peru-api.onrender.com"
      - key: VITE_DEPLOY_BASE
        value: "/"
